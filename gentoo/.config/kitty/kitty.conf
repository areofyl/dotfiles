font_family FantasqueSansM Nerd Font Mono Bold
font_size 15.0
confirm_os_window_close 0
linux_display_server auto
scrollback_lines 10000
scrollback_pager nvim -u NONE -c "set nonumber nolist showtabline=0 foldcolumn=0" -c "autocmd TermOpen * normal G" -c "map q :qa!<CR>" -c "set clipboard+=unnamedplus" -c "silent write! /tmp/kitty_scrollback | te cat /tmp/kitty_scrollback -" -
enable_audio_bell no

# nimbus palette — source of truth: ~/.config/nimbus/palette.sh
# bg #10141a  fg #c4ccd4  dim #5a6470
# green #7a9a8a  lavender #8a95b0  accent #8ab4d0
foreground #c4ccd4
background #10141a
cursor #c4ccd4
cursor_text_color #10141a
selection_foreground #10141a
selection_background #c4ccd4

# slightly muted ANSI colors
color0 #10141a
color1 #9a5048
color2 #6a8a78
color3 #a08860
color4 #5a7a95
color5 #8878a0
color6 #6a8a98
color7 #aab4c0
color8 #3a4250
color9 #b86858
color10 #88a898
color11 #bca078
color12 #7898b5
color13 #a090b8
color14 #88a8b8
color15 #c4ccd4
