# exec-once = blueman-applet # disabled — waybar bluetooth module handles this
exec-once = $scriptsDir/KeybindsLayoutInit.sh


# Workspace theme switcher (disabled - using fixed border colors)
# exec-once = ~/.config/hypr/scripts/workspace-theme.sh

exec-once = LD_PRELOAD=/usr/lib64/libgtk4-layer-shell.so python3 $HOME/file-preview/file-preview-daemon.py watch

# Preload Chromium at login for near-instant window opens
exec-once = flatpak run io.github.ungoogled_software.ungoogled_chromium --no-startup-window
