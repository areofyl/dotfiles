# WARNING: Do not add an explicit DP-1 rule — Asahi exposes a ghost
# DP-1 connector when unplugged, which freezes Hyprland (see #13311).
# Use the fallback rule instead. If nwg-displays overwrites this file,
# remove the DP-1 line manually.

# Laptop display
monitor=eDP-1,2560x1600@60.0,0x0,1.0

# Fallback for everything else (handles ghost DP-1 on Asahi)
# When you plug in an external monitor, it'll use its preferred mode
# and auto-place it to the right. Use nwg-displays to reposition.
monitor=,preferred,auto,1
