# Asahi DRM reports DP-1 as "connected" with valid EDID even when the
# display link is broken (ghost connector). This causes a 0x0 framebuffer
# that makes Waybar invisible. DP-1 is disabled here by default —
# MonitorHotplug.sh handles enabling it safely at runtime by polling
# DRM sysfs and guarding against 0x0 resolution.

# Laptop display
monitor=eDP-1,2560x1600@60.0,0x0,1.0

# External monitor (Dell U2720Q)
# Disabled by default — MonitorHotplug.sh enables it safely at runtime
# after verifying the resolution isn't 0x0 (ghost connector on Asahi DRM)
monitor=DP-1,disable

# Fallback for everything else (handles ghost connectors on Asahi)
monitor=,preferred,auto,1
